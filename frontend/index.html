<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultural Heritage Chatbot VQA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slideshow-container">
        <div class="slide active">
            <img src="images/colosseum.png" alt="Colosseo">
        </div>
        <div class="slide">
            <img src="images/pisa.png" alt="Pisa">
        </div>
        <div class="slide">
            <img src="images/venice.png" alt="Venezia">
        </div>
        <div class="slide">
            <img src="images/florence.png" alt="Firenze">
        </div>
    </div>

    <div class="white-overlay"></div>

    <button class="login-btn" id="loginBtn" onclick="window.location.href='login.html'">ACCEDI COME CURATORE</button>

    <div class="main-container">
        <div class="artistic-frame">
            <span class="corner-top-left"></span>
            <span class="corner-top-right"></span>
            <span class="corner-bottom-left"></span>
            <span class="corner-bottom-right"></span>
            <h1 class="title">Scopri il Patrimonio Culturale</h1>
            <div class="input-container" id="dropZone">
                <div class="input-content">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p class="drag-text">Trascina un'immagine qui</p>
                    <p class="or-text">oppure</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <div class="btn-group">
                        <button class="browse-btn" id="browseBtn">Sfoglia File</button>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
                        <button class="browse-btn" id="cameraBtn">Scatta Foto</button>
                    </div>
                </div>
                <div class="preview-container" id="previewContainer" style="display: none;">
                    <img id="previewImage" src="" alt="Preview">
                    <button class="remove-btn" id="removeBtn">✕</button>
                </div>
            </div>

            <p class="text-input-label">oppure scrivi una domanda:</p>
            <input type="text" class="text-input" placeholder="Es: Dimmi qualcosa sul Colosseo..." id="textInput">

            <button class="submit-btn" id="submitBtn">Analizza</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
